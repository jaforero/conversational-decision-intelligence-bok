name: Publish stable release

on:
  push:
    branches:
      - main
    paths:
      - "governance/releases/v*.yml"
      - "governance/releases/v*-notes.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stable-release
  cancel-in-progress: false

jobs:
  release:
    name: Validate, tag and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Install browser test dependencies
        run: npm ci

      - name: Run stable release preflight
        run: python scripts/preflight_release.py

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual and accessibility gates
        run: npm test

      - name: Resolve release identity
        id: release
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          import yaml

          package = json.loads(Path("package.json").read_text(encoding="utf-8"))
          version = package["version"]
          if "-" in version:
              raise SystemExit("The active portal version is a pre-release, not a stable release")

          manifest_path = Path(f"governance/releases/v{version}.yml")
          if not manifest_path.exists():
              raise SystemExit(f"Stable manifest does not exist: {manifest_path}")

          manifest = yaml.safe_load(manifest_path.read_text(encoding="utf-8"))
          if manifest["status"] != "stable":
              raise SystemExit("Release manifest is not stable")
          if manifest["tag"] != f"v{manifest['release']}":
              raise SystemExit("Release tag and version differ")
          if manifest["release"] != version:
              raise SystemExit("Package version and stable manifest differ")

          notes_path = Path(manifest["notes_path"])
          if not notes_path.exists():
              raise SystemExit(f"Release notes do not exist: {notes_path}")

          print(f"version={manifest['release']}")
          print(f"tag={manifest['tag']}")
          print(f"title={manifest['title']}")
          print(f"notes_path={notes_path.as_posix()}")
          PY

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
          RELEASE_NOTES_PATH: ${{ steps.release.outputs.notes_path }}
        shell: bash
        run: |
          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            EXISTING_TARGET="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [ "${EXISTING_TARGET}" != "${GITHUB_SHA}" ]; then
              echo "${RELEASE_TAG} already points to ${EXISTING_TARGET}, not ${GITHUB_SHA}" >&2
              exit 1
            fi
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "${RELEASE_TAG} already exists at the validated commit."
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --target "${GITHUB_SHA}" \
            --title "${RELEASE_TITLE}" \
            --notes-file "${RELEASE_NOTES_PATH}"
