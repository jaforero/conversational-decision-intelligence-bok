name: Validate CDI-BoK

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  preflight:
    name: Governance, content and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Run current portal preflight
        run: python scripts/preflight_release.py
