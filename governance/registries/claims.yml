claims:
  - claim_id: CLAIM-CDI-001
    statement: Conversational Decision Intelligence es la disciplina propuesta que estudia cómo humanos e inteligencia artificial colaboran mediante conversaciones naturales para comprender datos, construir contexto, explorar escenarios y tomar mejores decisiones.
