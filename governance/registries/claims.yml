schema_version: 1.0.0
registry_id: CDI-CLAIMS
release: 0.8.1
claims:
  - claim_id: CLAIM-CDI-001
    statement: Conversational Decision Intelligence es el dominio de práctica interdisciplinar propuesto que estudia y diseña cómo personas y sistemas de inteligencia artificial colaboran mediante conversaciones para convertir evidencia confiable y contexto en decisiones explícitas, acción responsable y aprendizaje medible.
    claim_class: project-definition
    evidence_status: normative-project-language
    maturity: approved-project-definition
    owner: Javier Forero
    source_ids:
      - SRC-DR-002
      - SRC-ACADEMIC-HAI-001
    governed_by: ADR-015
    limits: Definición institucional aprobada para el proyecto; no afirma reconocimiento académico, acuñación del término ni eficacia generalizable.
  - claim_id: CLAIM-CDIBOK-001
    statement: El CDI-BoK es el sistema de conocimiento versionado que organiza el conocimiento oficial del proyecto CDI.
    claim_class: institutional-definition
    evidence_status: approved-governance
    maturity: approved
    owner: Javier Forero
    source_ids: []
    governed_by: CDI-GOV-001
  - claim_id: CLAIM-PULSE-001
    statement: PULSE is a human-centered Decision Intelligence methodology and operating philosophy that reduces the distance between organizational reality and better decisions by turning trusted data and context into shared understanding, action, and measurable learning.
    claim_class: constitutional-definition
    evidence_status: owner-authoritative
    maturity: constitutional
    owner: Javier Forero
    source_ids:
      - SRC-PULSE-DNA-001
      - SRC-PULSE-IDENTITY-002
    limits: Es una definición oficial; no constituye por sí sola evidencia de eficacia generalizable.
  - claim_id: CLAIM-DASH-001
    statement: dashboards.javierforero.co funciona dentro del ecosistema como Practice Lab externo del CDI-BoK.
    claim_class: ecosystem-designation
    evidence_status: approved-governance
    maturity: approved
    owner: Javier Forero
    source_ids: []
    governed_by: ADR-006
  - claim_id: CLAIM-STD-001
    statement: El CDI-BoK aspira a convertirse en un estándar internacional de referencia para Conversational Decision Intelligence.
    claim_class: aspiration
    evidence_status: not-a-recognition-claim
    maturity: declared-direction
    owner: Javier Forero
    source_ids: []
    limits: No usar como si ya existiera reconocimiento de un organismo de estandarización.
  - claim_id: CLAIM-CDI-PRIOR-001
    statement: La expresión Conversational Decision Intelligence tiene usos públicos anteriores a la creación del CDI-BoK.
    claim_class: prior-art-observation
    evidence_status: documented-public-prior-use
    maturity: verified-limited-scan
    owner: Research Editor
    source_ids:
      - SRC-PRIOR-CDI-001
      - SRC-PRIOR-CDI-002
    governed_by: ADR-015
    limits: La búsqueda no constituye un estudio exhaustivo de prioridad ni un análisis de propiedad intelectual.
  - claim_id: CLAIM-CDI-EFFECT-001
    statement: En una decisión y contexto específicos, una experiencia conversacional gobernada puede reducir fricción o latencia y mejorar comprensión, exploración o calidad de proceso sin reducir exactitud, control, equidad o accountability.
    claim_class: hypothesis
    evidence_status: mixed-emerging-evidence
    maturity: test-required
    owner: Javier Forero
    source_ids:
      - SRC-ACADEMIC-HAI-001
      - SRC-ACADEMIC-AIEVAL-001
    limits: Debe probarse contra una alternativa pertinente; la evidencia disponible no respalda un efecto universal.
  - claim_id: CLAIM-DOMAINS-001
    statement: El CDI-BoK organiza 29 dominios en ocho áreas como arquitectura editorial inicial.
    claim_class: institutional-taxonomy
    evidence_status: approved-governance-derived
    maturity: approved-institutional-taxonomy
    owner: Javier Forero
    source_ids:
      - SRC-DR-002
    limits: La taxonomía organiza el proyecto; no afirma consenso universal ni igual madurez entre dominios.
  - claim_id: CLAIM-PULSE-ROLE-001
    statement: PULSE funciona como framework of practice del ecosistema CDI-BoK sin ser sinónimo de CDI ni depender de una interfaz conversacional.
    claim_class: ecosystem-definition
    evidence_status: constitutional-derived
    maturity: approved-derived
    owner: Javier Forero
    source_ids:
      - SRC-PULSE-DNA-001
      - SRC-PULSE-IDENTITY-002
    governed_by: ADR-016
    limits: No amplía ni redefine el alcance constitucional de PULSE.
  - claim_id: CLAIM-PRACTICE-B2B-001
    statement: En el dataset simulado del dashboard comercial, junio de 2026 registra 80,11% de cumplimiento ponderado y los ocho vendedores quedan por debajo de 90%.
    claim_class: empirical-demo-observation
    evidence_status: reproduced-from-simulated-demo
    maturity: verified-within-demo
    owner: Javier Forero
    source_ids:
      - SRC-PRACTICE-DASH-B2B-001
    governed_by: ADR-019
    scope: Matrices embebidas observadas el 21 de julio de 2026 y agregado versionado del CDI-BoK.
    limits: No describe una operación comercial real ni permite inferir impacto de una intervención.
  - claim_id: CLAIM-PRACTICE-B2B-002
    statement: En el dataset simulado, la conversión media de Propuesta pasa de 48,03% en enero-marzo de 2026 a 36,53% en abril-junio, una variación de -11,50 puntos porcentuales.
    claim_class: empirical-demo-calculation
    evidence_status: reproduced-from-simulated-demo
    maturity: verified-within-demo
    owner: Javier Forero
    source_ids:
      - SRC-PRACTICE-DASH-B2B-001
    governed_by: ADR-019
    scope: Ventana trimestral preregistrada como baseline provisional del caso.
    limits: La ventana requiere sensibilidad y no demuestra que Propuesta cause el deterioro del cumplimiento.
  - claim_id: CLAIM-PRACTICE-B2B-003
    statement: Evento y referido tienen mayor win rate observado que inbound digital en el demo, pero la evidencia disponible no establece una superioridad robusta entre canales.
    claim_class: empirical-demo-interpretation
    evidence_status: reproduced-with-uncertainty
    maturity: bounded-demo-inference
    owner: Javier Forero
    source_ids:
      - SRC-PRACTICE-DASH-B2B-001
    governed_by: ADR-019
    scope: Oportunidades cerradas del pipeline simulado e intervalos de Wilson al 95%.
    limits: Los intervalos se superponen; no justifica por sí solo reasignación de presupuesto ni lenguaje de significancia.
  - claim_id: CLAIM-PRACTICE-B2B-HYP-001
    statement: Una intervención acotada sobre calidad y velocidad en Propuesta puede mejorar la conversión frente a un grupo comparable sin intervención.
    claim_class: causal-hypothesis
    evidence_status: untested
    maturity: preregistration-required
    owner: Javier Forero
    source_ids:
      - SRC-PRACTICE-B2B-001
      - SRC-PRACTICE-DASH-B2B-001
    governed_by: ADR-019
    scope: Futuro piloto comercial con datos gobernados, owner confirmado y contrafactual.
    limits: No hay acción ejecutada, outcome observado ni efecto atribuible; no usar como claim de eficacia de PULSE o CDI.
  - claim_id: CLAIM-DQ-OUTCOME-001
    statement: Conocer el resultado puede sesgar la evaluación retrospectiva de la calidad del proceso que produjo una decisión.
    claim_class: empirical-primary-study-finding
    evidence_status: supported-primary-study
    maturity: established-risk-with-context-limits
    owner: Research Editor
    source_ids:
      - SRC-ACADEMIC-OUTCOME-BIAS-001
    limits: La dirección del riesgo está respaldada por experimentos; su magnitud y condiciones deben evaluarse en cada contexto y no prueban que todo review retrospectivo esté sesgado.
  - claim_id: CLAIM-DQ-PROFILE-001
    statement: El CDI-BoK recomienda representar la calidad ex ante como un perfil multidimensional con evidencia y bloqueadores, no como una puntuación universal.
    claim_class: design-recommendation
    evidence_status: candidate-synthesis
    maturity: candidate
    owner: Javier Forero
    source_ids:
      - SRC-DQ-SDP-001
      - SRC-PULSE-DNA-001
    governed_by: ADR-021
    limits: No es un instrumento psicométrico validado, no tiene pesos universales y no permite benchmarking entre decisiones heterogéneas.
  - claim_id: CLAIM-DM-SYSTEM-001
    statement: El Decision Measurement System candidato organiza la medición alrededor de prioridad y outcome, calidad ex ante, acción y ejecución, tiempo y fricción, riesgo y guardrails, y calibración y aprendizaje.
    claim_class: institutional-candidate-framework
    evidence_status: candidate-synthesis
    maturity: candidate
    owner: Javier Forero
    source_ids:
      - SRC-PULSE-DNA-001
      - SRC-ARCH-001
      - SRC-NIST-AIRMF-001
    governed_by: ADR-021
    limits: La arquitectura busca integridad y trazabilidad; no se ha validado como predictor de outcomes ni como modelo de madurez.
  - claim_id: CLAIM-DM-CALIBRATION-001
    statement: Las reglas de puntuación propias permiten evaluar la calidad de pronósticos probabilísticos y están diseñadas para incentivar probabilidades honestas.
    claim_class: established-statistical-method
    evidence_status: peer-reviewed-methodological-foundation
    maturity: established-with-applicability-conditions
    owner: Research Editor
    source_ids:
      - SRC-ACADEMIC-SCORING-RULES-001
    limits: Requiere eventos repetidos, comparables y definidos ex ante; una puntuación aislada no establece calibración ni calidad global de una decisión.
  - claim_id: CLAIM-CDP-CATALOG-001
    statement: El CDI-BoK organiza su catálogo inicial en cinco patrones de decisión conversacional y seis anti-patrones para hacer explícitos movimientos, derechos, evidencia, stop conditions y salidas auditables.
    claim_class: institutional-candidate-taxonomy
    evidence_status: candidate-synthesis
    maturity: candidate
    owner: Javier Forero
    source_ids:
      - SRC-PULSE-DNA-001
      - SRC-PULSE-MAP-001
      - SRC-ARCH-001
    governed_by: ADR-023
    limits: La taxonomía no es exhaustiva, empíricamente validada ni reconocida externamente; organiza el candidato v0.8.0-rc.1 para prueba y revisión.
  - claim_id: CLAIM-CDP-SELECTION-001
    statement: El CDI-BoK recomienda seleccionar el patrón mínimo que resuelva el bloqueo decisional actual y ajustar su rigor según stakes, incertidumbre, reversibilidad y daño potencial.
    claim_class: design-recommendation
    evidence_status: constitutional-derived-candidate-guidance
    maturity: candidate
    owner: Javier Forero
    source_ids:
      - SRC-PULSE-DNA-001
      - SRC-ARCH-001
    governed_by: ADR-023
    limits: Es una regla de diseño proporcional, no evidencia de que menos estructura siempre sea superior ni de que el catálogo mejore outcomes.
