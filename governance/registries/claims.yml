schema_version: 1.0.0
registry_id: CDI-CLAIMS
release: 0.4.0
claims:
  - claim_id: CLAIM-CDI-001
    statement: Conversational Decision Intelligence es el dominio de práctica interdisciplinar propuesto que estudia y diseña cómo personas y sistemas de inteligencia artificial colaboran mediante conversaciones para convertir evidencia confiable y contexto en decisiones explícitas, acción responsable y aprendizaje medible.
    claim_class: project-definition
    evidence_status: normative-project-language
    maturity: approved-project-definition
    owner: Javier Forero
    source_ids:
      - SRC-DR-002
      - SRC-ACADEMIC-HAI-001
    governed_by: ADR-015
    limits: Definición institucional aprobada para el proyecto; no afirma reconocimiento académico, acuñación del término ni eficacia generalizable.
  - claim_id: CLAIM-CDIBOK-001
    statement: El CDI-BoK es el sistema de conocimiento versionado que organiza el conocimiento oficial del proyecto CDI.
    claim_class: institutional-definition
    evidence_status: approved-governance
    maturity: approved
    owner: Javier Forero
    source_ids: []
    governed_by: CDI-GOV-001
  - claim_id: CLAIM-PULSE-001
    statement: PULSE is a human-centered Decision Intelligence methodology and operating philosophy that reduces the distance between organizational reality and better decisions by turning trusted data and context into shared understanding, action, and measurable learning.
    claim_class: constitutional-definition
    evidence_status: owner-authoritative
    maturity: constitutional
    owner: Javier Forero
    source_ids:
      - SRC-PULSE-DNA-001
      - SRC-PULSE-IDENTITY-002
    limits: Es una definición oficial; no constituye por sí sola evidencia de eficacia generalizable.
  - claim_id: CLAIM-DASH-001
    statement: dashboards.javierforero.co funciona dentro del ecosistema como Practice Lab externo del CDI-BoK.
    claim_class: ecosystem-designation
    evidence_status: approved-governance
    maturity: approved
    owner: Javier Forero
    source_ids: []
    governed_by: ADR-006
  - claim_id: CLAIM-STD-001
    statement: El CDI-BoK aspira a convertirse en un estándar internacional de referencia para Conversational Decision Intelligence.
    claim_class: aspiration
    evidence_status: not-a-recognition-claim
    maturity: declared-direction
    owner: Javier Forero
    source_ids: []
    limits: No usar como si ya existiera reconocimiento de un organismo de estandarización.
  - claim_id: CLAIM-CDI-PRIOR-001
    statement: La expresión Conversational Decision Intelligence tiene usos públicos anteriores a la creación del CDI-BoK.
    claim_class: prior-art-observation
    evidence_status: documented-public-prior-use
    maturity: verified-limited-scan
    owner: Research Editor
    source_ids:
      - SRC-PRIOR-CDI-001
      - SRC-PRIOR-CDI-002
    governed_by: ADR-015
    limits: La búsqueda no constituye un estudio exhaustivo de prioridad ni un análisis de propiedad intelectual.
  - claim_id: CLAIM-CDI-EFFECT-001
    statement: En una decisión y contexto específicos, una experiencia conversacional gobernada puede reducir fricción o latencia y mejorar comprensión, exploración o calidad de proceso sin reducir exactitud, control, equidad o accountability.
    claim_class: hypothesis
    evidence_status: mixed-emerging-evidence
    maturity: test-required
    owner: Javier Forero
    source_ids:
      - SRC-ACADEMIC-HAI-001
      - SRC-ACADEMIC-AIEVAL-001
    limits: Debe probarse contra una alternativa pertinente; la evidencia disponible no respalda un efecto universal.
  - claim_id: CLAIM-DOMAINS-001
    statement: El CDI-BoK organiza 29 dominios en ocho áreas como arquitectura editorial inicial.
    claim_class: institutional-taxonomy
    evidence_status: approved-governance-derived
    maturity: approved-institutional-taxonomy
    owner: Javier Forero
    source_ids:
      - SRC-DR-002
    limits: La taxonomía organiza el proyecto; no afirma consenso universal ni igual madurez entre dominios.
  - claim_id: CLAIM-PULSE-ROLE-001
    statement: PULSE funciona como framework of practice del ecosistema CDI-BoK sin ser sinónimo de CDI ni depender de una interfaz conversacional.
    claim_class: ecosystem-definition
    evidence_status: constitutional-derived
    maturity: approved-derived
    owner: Javier Forero
    source_ids:
      - SRC-PULSE-DNA-001
      - SRC-PULSE-IDENTITY-002
    governed_by: ADR-016
    limits: No amplía ni redefine el alcance constitucional de PULSE.
