schema_version: 1.0.0
registry_id: CDI-EVIDENCE-PROFILES
release: 0.9.0
governed_by: ADR-028
reviewed_on: 2026-07-24
dimensions:
  authority: Autoridad legítima de la fuente para el tipo de afirmación.
  independence: Independencia respecto de PULSE, CDI-BoK y el claim evaluado.
  method: Transparencia y rigor del método que produjo la fuente.
  directness: Relación directa entre el contenido observado y el claim.
  currency: Vigencia temporal para el uso declarado.
  applicability: Transferibilidad al contexto de decisión considerado.
  conflicts_of_interest: Intereses de autoría, comerciales o editoriales relevantes.
  verification: Grado de contraste contra el original o snapshot recibido.
compatibility_policy:
  established_foundation:
    allowed_source_classes:
      - official-standard
      - public-framework
      - peer-reviewed-primary
      - peer-reviewed-methodological
    disallowed_as_sole_support:
      - author-pov
      - author-framework
      - pedagogical-example
      - ai-assisted-research-map
      - analyst-forecast
      - derived-architecture
      - derived-pilot-design
  project_definition:
    allowed_source_classes:
      - constitutional
      - author-pov
      - approved-governance
    condition: La fuente gobierna lenguaje institucional; no prueba reconocimiento ni eficacia.
  candidate_synthesis:
    allowed_source_classes:
      - constitutional
      - author-pov
      - author-framework
      - derived-architecture
      - peer-reviewed-primary
      - official-standard
      - public-framework
    condition: Debe declarar límites y no presentarse como consenso externo.
  bounded_empirical_finding:
    allowed_source_classes:
      - peer-reviewed-primary
      - empirical-evaluation
    condition: Debe conservar población, tarea, comparación y límites del estudio.
  future_signal:
    allowed_source_classes:
      - analyst-forecast
    condition: Debe declarar horizonte e incertidumbre; no implica hecho, causalidad ni readiness.
global_blocks:
  - incomplete snapshots cannot support any claim
  - AI-assisted research maps cannot directly support a material claim
  - analyst forecasts cannot support established, causal or readiness claims
  - no source class can establish general PULSE or CDI effectiveness without a direct evaluation
