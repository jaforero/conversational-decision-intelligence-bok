limitations:
  - CDI remains a proposed interdisciplinary practice domain, not a recognized scientific discipline.
  - PULSE is not presented as universally or scientifically validated.
  - Candidate learning, measurement and pattern artifacts do not become empirically validated or normative through bundle stability.
  - The B2B case remains simulated, instrumented and not executed, with no observed outcome or attributable impact.
  - Automated accessibility checks do not establish WCAG 2.2 AA conformance.
  - Stable 0.x publication does not imply 1.0 maturity or external standardization.
