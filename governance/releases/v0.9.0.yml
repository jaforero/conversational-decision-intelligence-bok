limitations:
  - The DI state-of-the-art thesis remains provisional and is not a complete systematic review.
  - Stable publication does not scientifically validate CDI or PULSE.
  - Evidence profiles and claim compatibility do not eliminate source-quality or interpretation risk.
  - Assisted syntheses remain discovery aids and cannot establish a PULSE hypothesis.
  - The B2B case remains instrumented and not executed; no outcome or organizational impact is demonstrated.
  - Automated accessibility checks do not establish full WCAG 2.2 AA conformance.
