objective: Establish, ratify and stably publish the minimum foundational core of CDI-BoK without overstating disciplinary maturity, originality or empirical validation.
scope:
  - CDI-BoK approved constitution
  - CDI scope and boundaries with prior-art disclosure
  - Initial controlled glossary
  - Eight-area and 29-domain knowledge map
  - PULSE core specification derived from canonical sources
