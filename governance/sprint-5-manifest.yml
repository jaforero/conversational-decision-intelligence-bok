owner: Javier Forero
objective: Activate Decision Metrics with a rigorous, usable and proportionate measurement system that separates ex-ante quality, execution, outcome, risk and learning without creating a false universal score.
scope:
  - Decision Quality guide with explicit established and candidate boundaries
  - Six-lens Decision Measurement System
  - Versioned Decision Measurement Record template
  - Probabilistic calibration and latency formulas with applicability limits
  - Human-AI measurement cautions and anti-metrics
  - Navigation, versioning, ADR, registries and automated gates
out_of_scope:
  - Universal Decision Health Score or cross-context benchmark
  - Validated psychometric or organizational maturity instrument
  - Claim that measurement improves business outcomes
  - New executed case or change to B2B-PROP-001 evidence state
  - Stable promotion of v0.7.0
  - Change to the authority of the v0.4.0 foundational core
