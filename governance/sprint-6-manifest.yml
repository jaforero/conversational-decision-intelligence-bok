schema_version: 1.0.0
sprint: 6
release: 0.8.0-rc.1
status: candidate-implemented-not-ratified
started_on: 2026-07-21
owner: Javier Forero
objective: Provide a bounded and testable pattern language for recurring decision conversations, including contraindications and anti-patterns, without presenting an institutional taxonomy as universal evidence.
scope:
  - Candidate pattern language, anatomy, maturity and selection rules
  - Five conversational decision patterns spanning framing through learning
  - Six observable anti-patterns with second-order risks and repairs
  - Machine-readable registry and reusable null-state template
  - Stopped B2B demonstration that preserves the simulated evidence boundary
  - Navigation, release note, ADR, registries and automated gates
out_of_scope:
  - Universal or exhaustive decision-pattern taxonomy
  - Prompt library, UI component library or conversational product
  - Normative PULSE Decision Patterns or Pattern Library documents
  - Claim that following a pattern improves outcomes
  - Executed B2B intervention, confirmed owner or observed outcome
  - Stable promotion of v0.8.0
  - Change to the authority of the v0.4.0 foundational core
decisions:
