site_name: Conversational Decision Intelligence Body of Knowledge
site_description: Aprende a convertir datos, analítica e inteligencia artificial en decisiones explícitas, acción responsable y aprendizaje medible.
site_author: Javier Forero
site_url: https://decision.javierforero.co
repo_url: https://github.com/jaforero/conversational-decision-intelligence-bok
repo_name: jaforero/conversational-decision-intelligence-bok
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true
copyright: "Javier Forero · javierforero.co"

theme:
  name: material
  custom_dir: overrides
  language: es
  font: false
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Cambiar a tema oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Cambiar a tema claro
  icon:
    repo: fontawesome/brands/github

nav:
  - Inicio: index.md
  - Empieza aquí:
      - Visión general: start-here/index.md
      - Cómo usar el CDI-BoK: start-here/how-to-use.md
  - Aprende:
      - Ruta de aprendizaje: learn/index.md
      - 1. Enfocar la decisión: learn/01-decision-first.md
      - 2. Evidencia y contexto: learn/02-evidence-context.md
      - 3. Decision Experience: learn/03-decision-experience.md
      - 4. Control humano–IA: learn/04-human-ai-control.md
      - 5. Acción y aprendizaje: learn/05-action-learning.md
      - Plantilla Decision Brief: learn/decision-brief.md
  - Calidad y medición:
      - Visión general: 07-governance-quality/index.md
      - Decision Quality: 07-governance-quality/decision-quality.md
      - Decision Measurement System: 07-governance-quality/decision-measurement-system.md
      - Decision Measurement Record: 07-governance-quality/measurement-record.md
  - Patrones de decisión:
      - Visión general: 08-patterns/index.md
      - Lenguaje y plantilla: 08-patterns/pattern-language.md
      - Catálogo de patrones: 08-patterns/catalog.md
      - Anti-patrones: 08-patterns/anti-patterns.md
      - Aplicación B2B: 08-patterns/b2b-proposal-walkthrough.md
  - CDI-BoK:
      - Visión general: 00-foundation/index.md
      - Constitución: 00-foundation/constitution.md
      - Alcance y fronteras de CDI: 00-foundation/cdi-scope-boundaries.md
      - Glosario: 00-foundation/glossary.md
      - Mapa de dominios: 00-foundation/domain-map.md
  - PULSE:
      - Identidad y función: 03-pulse/index.md
      - Especificación nuclear: 03-pulse/specification.md
  - Practice Lab:
      - Visión general: practice-lab/index.md
      - Catálogo: practice-lab/catalog.md
      - Caso B2B · Propuesta:
          - Caso instrumentado: practice-lab/b2b-proposal/index.md
          - Contrato de decisión: practice-lab/b2b-proposal/decision-contract.md
          - Protocolo de evidencia: practice-lab/b2b-proposal/evidence-protocol.md
          - Registro del ciclo: practice-lab/b2b-proposal/cycle-log.md
  - Research: research/index.md
  - Gobernanza:
      - Sistema de autoridad: governance/index.md
      - Arquitectura editorial: governance/architecture.md
      - Claims y evidencia: governance/claims-evidence.md
      - Publicación y dominio: governance/publication-runbook.md
  - Versiones:
      - Estado e historial: versions/index.md
      - Candidato v0.8.1-rc.1: versions/v0.8.1-rc.1.md
      - Release v0.8.0: versions/v0.8.0.md
      - Candidato v0.8.0-rc.1: versions/v0.8.0-rc.1.md
      - Candidato v0.7.0-rc.1: versions/v0.7.0-rc.1.md
      - Candidato v0.6.0-rc.1: versions/v0.6.0-rc.1.md
      - Candidato v0.5.0-rc.1: versions/v0.5.0-rc.1.md
      - Release v0.4.0: versions/v0.4.0.md
  - Acerca de: about/index.md

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: false
      reconfigure_material: true
      languages:
        - locale: es
          default: true
          name: Español
          build: true
        - locale: en
          name: English
          build: true
          site_description: Learn to turn data, analytics and artificial intelligence into explicit decisions, responsible action and measurable learning.
          theme:
            palette:
              - toggle:
                  name: Switch to dark mode
              - toggle:
                  name: Switch to light mode
          nav_translations:
            Inicio: Home
            Empieza aquí: Start here
            Visión general: Overview
            Cómo usar el CDI-BoK: How to use the CDI-BoK
            Aprende: Learn
            Ruta de aprendizaje: Learning path
            1. Enfocar la decisión: 1. Frame the decision
            2. Evidencia y contexto: 2. Evidence and context
            4. Control humano–IA: 4. Human–AI control
            5. Acción y aprendizaje: 5. Action and learning
            Plantilla Decision Brief: Decision Brief template
            Calidad y medición: Quality and measurement
            Patrones de decisión: Decision patterns
            Lenguaje y plantilla: Language and template
            Catálogo de patrones: Pattern catalog
            Anti-patrones: Anti-patterns
            Aplicación B2B: B2B application
            Catálogo: Catalog
            Caso B2B · Propuesta: B2B case · Proposal
            Constitución: Constitution
            Alcance y fronteras de CDI: CDI scope and boundaries
            Glosario: Glossary
            Mapa de dominios: Domain map
            Identidad y función: Identity and role
            Especificación nuclear: Core specification
            Caso instrumentado: Instrumented case
            Contrato de decisión: Decision contract
            Protocolo de evidencia: Evidence protocol
            Registro del ciclo: Cycle record
            Gobernanza: Governance
            Sistema de autoridad: Authority system
            Arquitectura editorial: Editorial architecture
            Claims y evidencia: Claims and evidence
            Publicación y dominio: Publishing and domain
            Versiones: Versions
            Estado e historial: Status and history
            Candidato v0.8.0-rc.1: Candidate v0.8.0-rc.1
            Candidato v0.8.1-rc.1: Candidate v0.8.1-rc.1
            Candidato v0.7.0-rc.1: Candidate v0.7.0-rc.1
            Candidato v0.6.0-rc.1: Candidate v0.6.0-rc.1
            Candidato v0.5.0-rc.1: Candidate v0.5.0-rc.1
            Acerca de: About
  - search:
      separator: '[\\s\\-\\.\\_]+'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/brand-tokens.css
  - assets/stylesheets/brand.css
  - assets/stylesheets/cdi-bok.css

extra_javascript:
  - assets/javascripts/site.js

extra:
  release:
    normative: v0.2.0
    portal: v0.8.1-rc.1
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jaforero
      name: Javier Forero en GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/jforero/
      name: Javier Forero en LinkedIn
    - icon: fontawesome/solid/globe
      link: https://javierforero.co
      name: Sitio de Javier Forero

validation:
  nav:
    omitted_files: ignore
    not_found: warn
  links:
    not_found: warn
    absolute_links: info
    unrecognized_links: warn
    anchors: warn
